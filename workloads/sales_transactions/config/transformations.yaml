---
# Transformation rules for sales_transactions workload
# Bronze -> Silver cleaning rules
# Generated by Transformation Agent on 2026-03-02

workload: sales_transactions
version: "1.0"
generated_at: "2026-03-02"

bronze_to_silver:
  description: "Cleaning and standardization rules applied when promoting raw data from Bronze to Silver zone"

  deduplication:
    enabled: true
    key: order_id
    strategy: keep_first
    description: "Remove duplicate rows based on order_id, keeping the first occurrence"

  quarantine:
    enabled: true
    conditions:
      - name: null_primary_key
        column: order_id
        rule: "value is null or empty"
        severity: critical
        description: "Rows with null/empty order_id cannot be processed"
    output_path: "data/quarantine/quarantined_records.csv"

  string_normalization:
    trim_whitespace:
      enabled: true
      apply_to: all_string_columns
      description: "Strip leading/trailing whitespace from all string-typed columns"
    lowercase:
      enabled: true
      columns:
        - email
      description: "Lowercase email addresses for consistency"

  date_validation:
    rules:
      - column: order_date
        format: "%Y-%m-%d"
        nullable: false
        description: "Validate order_date is ISO 8601 (YYYY-MM-DD); reject if invalid"
      - column: ship_date
        format: "%Y-%m-%d"
        nullable: true
        null_meaning: "pending order — not yet shipped"
        description: "Validate ship_date is ISO 8601 if present; null is valid (pending)"

  type_casting:
    rules:
      - column: order_id
        target_type: string
      - column: customer_id
        target_type: string
      - column: customer_name
        target_type: string
      - column: email
        target_type: string
      - column: phone
        target_type: string
      - column: order_date
        target_type: date
        format: "%Y-%m-%d"
      - column: ship_date
        target_type: date
        format: "%Y-%m-%d"
      - column: region
        target_type: string
      - column: product_category
        target_type: string
      - column: product_name
        target_type: string
      - column: quantity
        target_type: integer
      - column: unit_price
        target_type: double
      - column: discount_pct
        target_type: double
      - column: revenue
        target_type: double
      - column: payment_method
        target_type: string
      - column: status
        target_type: string

  null_handling:
    rules:
      - column: order_id
        action: quarantine
        description: "Null PKs are quarantined — they cannot enter Silver"
      - column: customer_id
        action: quarantine
        description: "Null foreign keys are quarantined"
      - column: email
        action: keep
        description: "Null emails are allowed (3 known nulls in source)"
      - column: phone
        action: keep
        description: "Null phones are allowed (1 known null in source)"
      - column: ship_date
        action: keep
        description: "Null ship_date means order is pending — valid business state"
      - column: customer_name
        action: quarantine
        description: "Null customer names are quarantined"

  pii_masking:
    enabled: true
    description: "Mask PII columns before writing to Silver zone"
    rules:
      - column: email
        pii_type: email_address
        strategy: hash_sha256
        description: "SHA-256 hash of email address"
      - column: phone
        pii_type: phone_number
        strategy: redact
        replacement: "***-****"
        description: "Replace phone with static redacted pattern"
      - column: customer_name
        pii_type: personal_name
        strategy: hash_sha256
        description: "SHA-256 hash of customer name"

  output:
    path: "data/silver/sales_transactions_clean.csv"
    format: csv
    delimiter: ","
    encoding: utf-8
    include_header: true

silver_to_gold:
  description: "Aggregation rules for promoting Silver to Gold zone"
  aggregation:
    group_by:
      - region
      - product_category
    measures:
      - column: revenue
        aggregations:
          - sum
          - avg
          - min
          - max
      - column: quantity
        aggregations:
          - sum
      - column: order_id
        aggregations:
          - count_distinct
        alias: order_count
  output:
    path: "data/gold/sales_summary_by_region_category.csv"
    format: csv
    delimiter: ","
    encoding: utf-8
    include_header: true
