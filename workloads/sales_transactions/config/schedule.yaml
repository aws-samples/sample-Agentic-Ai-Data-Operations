---
# Schedule configuration for sales_transactions workload
# Generated by Orchestration DAG Agent on 2026-03-02

schedule:
  workload: sales_transactions
  description: "Daily ingestion and transformation of e-commerce sales transactions"

  # Cron expression: daily at 6:00 AM UTC
  cron: "0 6 * * *"
  timezone: UTC

  # Retry policy
  max_retries: 3
  retry_delay_seconds: 300
  retry_backoff: exponential
  retry_backoff_max_seconds: 3600

  # SLA: entire pipeline must complete within this window
  sla_minutes: 60

  # Failure notification
  failure_notification:
    type: sns
    topic_arn: "arn:aws:sns:us-east-1:ACCOUNT_ID:data-pipeline-alerts"
    message_template: >
      Pipeline '{workload}' failed at task '{task_id}'
      on execution_date '{execution_date}'.
      Log: {log_url}

  # Upstream dependencies (empty = no dependencies)
  depends_on: []

  # Downstream consumers (informational, not enforced)
  downstream_consumers:
    - name: analytics_dashboard
      type: scheduled_refresh
      notes: "Tableau dashboard refreshes 30 min after Gold zone is updated"

  # Maintenance window — DAG will not run during this period
  maintenance_window:
    enabled: false
    start: "02:00"
    end: "04:00"
    timezone: UTC
