seed_sql_examples:
  - name: "Revenue by region"
    description: "Total and average revenue broken down by region"
    sql: |
      SELECT
          region,
          COUNT(*) AS order_count,
          SUM(revenue) AS total_revenue,
          ROUND(AVG(revenue), 2) AS avg_revenue
      FROM sales_transactions
      GROUP BY region
      ORDER BY total_revenue DESC;

  - name: "Top product categories by quantity"
    description: "Product categories ranked by total units sold"
    sql: |
      SELECT
          product_category,
          SUM(quantity) AS total_units,
          SUM(revenue) AS total_revenue,
          COUNT(DISTINCT customer_id) AS unique_customers
      FROM sales_transactions
      GROUP BY product_category
      ORDER BY total_units DESC;

  - name: "Pending orders detail"
    description: "All orders that have not yet shipped"
    sql: |
      SELECT
          order_id,
          customer_name,
          order_date,
          region,
          product_name,
          revenue
      FROM sales_transactions
      WHERE status = 'pending'
      ORDER BY order_date;
