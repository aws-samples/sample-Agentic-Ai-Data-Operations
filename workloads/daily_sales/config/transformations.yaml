# transformations.yaml — Cleaning rules (Bronze->Silver) and Gold modeling (Silver->Gold)
# Generated by Metadata Agent on 2026-03-18

transformations:
  workload: daily_sales

  # ============================================================
  # Bronze -> Silver: Cleaning, dedup, type casting, PII masking
  # ============================================================
  bronze_to_silver:
    description: "Clean raw CSV data, enforce types, deduplicate, mask PII"

    # Deduplication
    deduplication:
      enabled: true
      key_columns:
        - sale_id
      strategy: keep_first
      # Keep earliest ingested record for duplicate sale_id values

    # Null handling
    null_handling:
      rules:
        - column: customer_email
          strategy: fill_default
          default_value: "unknown@masked.invalid"
        - column: customer_name
          strategy: fill_default
          default_value: "UNKNOWN"
        # All other nullable columns: leave null (flagged by quality checks)

    # Type casting — enforce correct types from CSV strings
    type_casting:
      rules:
        - column: quantity
          target_type: integer
          on_failure: quarantine
        - column: unit_price
          target_type: float
          on_failure: quarantine
        - column: discount_pct
          target_type: float
          on_failure: quarantine
        - column: total_amount
          target_type: float
          on_failure: quarantine
        - column: sale_date
          target_type: date
          format: "YYYY-MM-DD"
          on_failure: quarantine

    # Row-level validation — invalid rows go to quarantine
    validation:
      rules:
        - name: discount_pct_range
          description: "Discount must be between 0 and 100 inclusive"
          expression: "discount_pct >= 0 AND discount_pct <= 100"
          severity: critical
        - name: quantity_positive
          description: "Quantity must be greater than zero"
          expression: "quantity > 0"
          severity: critical
        - name: total_amount_positive
          description: "Total amount must be greater than zero"
          expression: "total_amount > 0"
          severity: critical

    # PII masking — applied before writing to Silver
    pii_masking:
      rules:
        - column: customer_email
          strategy: hash
          algorithm: sha256
          description: "SHA-256 hash of email for pseudonymization"
        - column: customer_name
          strategy: mask
          pattern: "***"
          description: "Replace name with mask pattern in Silver"

    # Quarantine — failed records stored separately, never silently dropped
    quarantine:
      enabled: true
      path: "s3://${DATA_LAKE_BUCKET}/quarantine/daily_sales/"
      include_error_context: true
      # Each quarantined record includes: original row, rule_name, failure_reason, timestamp

    # Output format — Silver is always Iceberg
    output:
      format: iceberg
      partition_by:
        - sale_date
      write_mode: append

  # ============================================================
  # Silver -> Gold: Star schema modeling
  # ============================================================
  silver_to_gold:
    description: "Transform cleaned Silver data into star schema (fact + dimensions)"
    gold_format: star_schema

    # Fact table
    fact_tables:
      - name: fact_sales
        description: "Fact table containing sales transactions with foreign keys to dimensions"
        grain:
          - sale_id
          - sale_date
        columns:
          - name: sale_id
            source: sale_id
          - name: sale_date
            source: sale_date
          - name: store_key
            source: store_id
            foreign_key: dim_store.store_key
          - name: product_key
            source: product_sku
            foreign_key: dim_product.product_key
          - name: quantity
            source: quantity
          - name: unit_price
            source: unit_price
          - name: discount_pct
            source: discount_pct
          - name: total_amount
            source: total_amount
          - name: payment_method
            source: payment_method

    # Dimension tables
    dimension_tables:
      - name: dim_store
        description: "Store dimension — unique stores with region"
        scd_type: 1
        natural_key: store_id
        columns:
          - name: store_key
            source: store_id
            description: "Surrogate key (derived from store_id)"
          - name: store_id
            source: store_id
          - name: store_name
            source: store_name
          - name: region
            source: region

      - name: dim_product
        description: "Product dimension — unique products with category"
        scd_type: 1
        natural_key: product_sku
        columns:
          - name: product_key
            source: product_sku
            description: "Surrogate key (derived from product_sku)"
          - name: product_sku
            source: product_sku
          - name: product_name
            source: product_name
          - name: category
            source: category

      - name: dim_date
        description: "Date dimension — calendar attributes derived from sale_date"
        natural_key: sale_date
        columns:
          - name: date_key
            source: sale_date
            description: "Date key in YYYYMMDD integer format"
          - name: sale_date
            source: sale_date
          - name: day_of_week
            derived: "DAYOFWEEK(sale_date)"
            description: "Day of week (1=Monday, 7=Sunday)"
          - name: month
            derived: "MONTH(sale_date)"
            description: "Month number (1-12)"
          - name: quarter
            derived: "QUARTER(sale_date)"
            description: "Quarter number (1-4)"
          - name: year
            derived: "YEAR(sale_date)"
            description: "Four-digit year"

    # Output — Gold is Iceberg (star schema tables)
    output:
      format: iceberg
      write_mode: overwrite
      # Each dimension table partitioned appropriately
      partitioning:
        fact_sales:
          - sale_date
        dim_date:
          - year
