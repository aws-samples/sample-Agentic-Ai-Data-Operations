# semantic.yaml — Column roles, business context, PII flags, aggregation semantics
# Generated by Metadata Agent on 2026-03-18
# This is the SINGLE SOURCE OF TRUTH for metadata + business context

semantic:
  workload: daily_sales
  description: "Daily retail sales transactions — measures revenue, quantity, and discount across stores, products, regions, and time"

  # Grain definition — critical for ORION consumer to avoid double-counting
  grain:
    description: "One row per sale_id per sale_date"
    grain_columns:
      - sale_id
      - sale_date

  # Column definitions with roles, types, PII flags, and aggregation semantics
  columns:
    # --- Primary Key ---
    - name: sale_id
      role: identifier
      type: string
      description: "Unique sale transaction identifier"
      is_primary_key: true
      nullable: false
      pii: false

    # --- Temporal ---
    - name: sale_date
      role: temporal
      type: date
      description: "Date of the sale transaction"
      nullable: false
      pii: false
      time_grain: day

    # --- Dimensions ---
    - name: store_id
      role: dimension
      type: string
      description: "Unique store identifier — foreign key to dim_store"
      nullable: false
      pii: false

    - name: store_name
      role: dimension
      type: string
      description: "Human-readable store name"
      nullable: false
      pii: false

    - name: product_sku
      role: dimension
      type: string
      description: "Product SKU — foreign key to dim_product"
      nullable: false
      pii: false

    - name: product_name
      role: dimension
      type: string
      description: "Human-readable product name"
      nullable: false
      pii: false

    - name: category
      role: dimension
      type: string
      description: "Product category (Electronics, Footwear, Grocery, Home, Sports)"
      nullable: false
      pii: false

    - name: payment_method
      role: dimension
      type: string
      description: "Payment method (credit_card, debit_card, cash, mobile_pay)"
      nullable: false
      pii: false

    - name: region
      role: dimension
      type: string
      description: "Geographic region (Northeast, Southeast, Midwest, West)"
      nullable: false
      pii: false

    # --- PII Columns ---
    - name: customer_name
      role: dimension
      type: string
      description: "Customer full name — PII, masked in Silver/Gold"
      nullable: true
      pii: true
      pii_type: NAME
      pii_sensitivity: MEDIUM
      # Masked via SHA-256 hash prefix in Silver zone
      masking_strategy: mask

    - name: customer_email
      role: dimension
      type: string
      description: "Customer email address — PII, hashed in Silver/Gold"
      nullable: true
      pii: true
      pii_type: EMAIL
      pii_sensitivity: HIGH
      # SHA-256 hash in Silver zone
      masking_strategy: hash

    # --- Measures ---
    - name: quantity
      role: measure
      type: integer
      description: "Number of units sold in this transaction"
      nullable: false
      pii: false
      default_aggregation: SUM
      # SUM(quantity) = total units sold

    - name: unit_price
      role: measure
      type: float
      description: "Price per unit before discount"
      nullable: false
      pii: false
      default_aggregation: AVG
      # AVG(unit_price) = average selling price; SUM is meaningless

    - name: discount_pct
      role: measure
      type: float
      description: "Discount percentage applied (0-100 scale)"
      nullable: false
      pii: false
      default_aggregation: AVG
      # AVG(discount_pct) = average discount rate; SUM is meaningless

    - name: total_amount
      role: measure
      type: float
      description: "Final transaction amount after discount"
      nullable: false
      pii: false
      default_aggregation: SUM
      # SUM(total_amount) = total revenue

  # Dimension hierarchies for drill-down
  dimension_hierarchies:
    - name: geography
      levels:
        - region
        - store_name
    - name: product
      levels:
        - category
        - product_name
    - name: time
      levels:
        - sale_date

  # Business terms and synonyms — so natural language queries resolve correctly
  business_terms:
    - term: revenue
      synonyms:
        - sales
        - turnover
        - income
        - total sales
      sql_expression: "SUM(total_amount)"
      description: "Total revenue from completed sales"

    - term: average order value
      synonyms:
        - AOV
        - avg order
        - average transaction
      sql_expression: "AVG(total_amount)"
      description: "Average transaction amount per sale"

    - term: units sold
      synonyms:
        - quantity sold
        - items sold
        - volume
      sql_expression: "SUM(quantity)"
      description: "Total number of units sold"

    - term: average discount
      synonyms:
        - avg discount
        - mean discount
      sql_expression: "AVG(discount_pct)"
      description: "Average discount percentage across transactions"

  # Default filters — encode business logic so queries are unambiguous
  default_filters:
    - name: valid_transactions
      description: "Exclude transactions with zero or negative total"
      sql: "total_amount > 0"
      apply_by_default: true

  # Time intelligence
  time_intelligence:
    time_column: sale_date
    time_grain: day
    fiscal_year_start_month: 1
    week_start_day: monday
    timezone: "UTC"

  # Lake Formation LF-Tags for column-level security
  lf_tags:
    - tag_key: PII_Classification
      values:
        - PII
        - NON_PII
    - tag_key: PII_Type
      values:
        - NAME
        - EMAIL
    - tag_key: Data_Sensitivity
      values:
        - HIGH
        - MEDIUM
        - LOW

  # Tag assignments
  lf_tag_assignments:
    - column: customer_name
      tags:
        PII_Classification: PII
        PII_Type: NAME
        Data_Sensitivity: MEDIUM
    - column: customer_email
      tags:
        PII_Classification: PII
        PII_Type: EMAIL
        Data_Sensitivity: HIGH
