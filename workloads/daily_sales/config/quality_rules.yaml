# quality_rules.yaml — Quality rules with thresholds for daily_sales workload
# Generated by Metadata Agent on 2026-03-18
# 5 dimensions: Completeness, Accuracy, Consistency, Validity, Uniqueness

quality:
  workload: daily_sales

  # Zone thresholds — quality gates block promotion
  thresholds:
    silver:
      minimum_score: 0.80
      critical_rules_must_pass: true
      # Data MUST score >= 80% AND pass all critical rules to enter Silver
    gold:
      minimum_score: 0.95
      critical_rules_must_pass: true
      # Data MUST score >= 95% AND pass all critical rules to enter Gold

  # Anomaly detection settings
  anomaly_detection:
    enabled: true
    outlier_std_dev: 3
    volume_deviation_pct: 20
    null_spike_threshold: 0.10

  # ============================================================
  # Rules by dimension
  # ============================================================
  rules:

    # --- Completeness: required fields are not null ---
    completeness:
      - name: sale_id_not_null
        column: sale_id
        check: not_null
        severity: critical
        description: "Primary key sale_id must never be null"

      - name: sale_date_not_null
        column: sale_date
        check: not_null
        severity: critical
        description: "Sale date must never be null"

      - name: store_id_not_null
        column: store_id
        check: not_null
        severity: warning
        description: "Store ID should not be null"

      - name: product_sku_not_null
        column: product_sku
        check: not_null
        severity: warning
        description: "Product SKU should not be null"

      - name: quantity_not_null
        column: quantity
        check: not_null
        severity: critical
        description: "Quantity must never be null"

      - name: total_amount_not_null
        column: total_amount
        check: not_null
        severity: critical
        description: "Total amount must never be null"

    # --- Uniqueness: no duplicate records ---
    uniqueness:
      - name: sale_id_unique
        column: sale_id
        check: unique
        severity: critical
        description: "Primary key sale_id must be unique across dataset"

    # --- Validity: values within acceptable ranges/formats ---
    validity:
      - name: discount_pct_range
        column: discount_pct
        check: range
        min_value: 0
        max_value: 100
        severity: critical
        description: "Discount percentage must be between 0 and 100"

      - name: quantity_positive
        column: quantity
        check: greater_than
        threshold: 0
        severity: critical
        description: "Quantity must be greater than zero"

      - name: total_amount_positive
        column: total_amount
        check: greater_than
        threshold: 0
        severity: critical
        description: "Total amount must be greater than zero"

      - name: unit_price_positive
        column: unit_price
        check: greater_than
        threshold: 0
        severity: warning
        description: "Unit price should be greater than zero"

      - name: sale_date_format
        column: sale_date
        check: date_format
        format: "YYYY-MM-DD"
        severity: critical
        description: "Sale date must be valid date in YYYY-MM-DD format"

      - name: payment_method_valid
        column: payment_method
        check: in_set
        allowed_values:
          - credit_card
          - debit_card
          - cash
          - mobile_pay
        severity: warning
        description: "Payment method must be one of the known types"

      - name: region_valid
        column: region
        check: in_set
        allowed_values:
          - Northeast
          - Southeast
          - Midwest
          - West
        severity: warning
        description: "Region must be one of the known regions"

    # --- Consistency: cross-column relationships ---
    consistency:
      - name: total_amount_calculation
        check: expression
        expression: "ABS(total_amount - (quantity * unit_price * (1 - discount_pct / 100))) < 0.02"
        severity: warning
        description: "Total amount should approximately equal quantity * unit_price * (1 - discount_pct/100), allowing 2 cent rounding tolerance"

      - name: store_name_consistent
        check: functional_dependency
        determinant: store_id
        dependent: store_name
        severity: warning
        description: "Same store_id should always map to the same store_name"

      - name: product_name_consistent
        check: functional_dependency
        determinant: product_sku
        dependent: product_name
        severity: warning
        description: "Same product_sku should always map to the same product_name"

    # --- Accuracy: statistical checks ---
    accuracy:
      - name: total_amount_outlier
        column: total_amount
        check: outlier
        method: std_dev
        threshold: 3
        severity: warning
        description: "Flag transactions with total_amount more than 3 std dev from mean"

      - name: quantity_outlier
        column: quantity
        check: outlier
        method: std_dev
        threshold: 3
        severity: warning
        description: "Flag transactions with unusually high quantity"

  # Historical comparison baseline
  baseline:
    enabled: true
    comparison: previous_run
    metrics:
      - row_count
      - null_rate
      - distinct_count
      - mean
      - std_dev
