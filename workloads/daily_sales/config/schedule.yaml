# schedule.yaml — Airflow DAG scheduling config for daily_sales workload
# Generated by Metadata Agent on 2026-03-18

schedule:
  workload: daily_sales
  description: "Daily ingestion and processing of retail sales data"

  # Schedule — daily at 07:00 UTC (after overnight POS batch export)
  frequency: daily
  start_time: "07:00"
  timezone: "UTC"
  cron_expression: "0 7 * * *"

  # Airflow DAG defaults
  dag_config:
    catchup: false
    max_active_runs: 1
    concurrency: 4
    dagrun_timeout_minutes: 120

  # Retry policy — exponential backoff
  retry_policy:
    retries: 3
    retry_delay_minutes: 5
    retry_exponential_backoff: true
    max_retry_delay_minutes: 60

  # Failure handling
  failure_handling:
    on_failure_callback: true
    notification_channel: "sns"
    # SNS topic ARN from Airflow Variable — never hardcoded
    notification_topic_variable: "daily_sales_alert_topic_arn"

  # SLA — alert if tasks exceed expected duration
  sla:
    bronze_load_minutes: 15
    silver_transform_minutes: 30
    gold_transform_minutes: 30
    quality_check_minutes: 10

  # Dependencies — no upstream DAGs for this workload
  dependencies: []

  # Tags for Airflow UI filtering
  tags:
    - daily_sales
    - retail
    - daily
    - bronze-silver-gold
