# source.yaml — Connection and schema config for daily_sales workload
# Generated by Metadata Agent on 2026-03-18

source:
  name: daily_sales
  description: "Daily point-of-sale transaction records from retail stores"
  format: csv
  frequency: daily
  # S3 location uses placeholder bucket — replace with actual bucket at deploy time
  location: "s3://${DATA_LAKE_BUCKET}/bronze/daily_sales/"
  file_pattern: "daily_sales_*.csv"
  # Credentials via Airflow Connection ID — never hardcoded
  connection_id: "aws_default"
  options:
    delimiter: ","
    encoding: "utf-8"
    has_header: true
    quote_char: "\""

  # Primary key for deduplication
  primary_key:
    - sale_id

  # Schema definition — all 15 columns from source CSV
  schema:
    columns:
      - name: sale_id
        type: string
        description: "Unique identifier for each sale transaction"
        nullable: false
      - name: sale_date
        type: date
        description: "Date when the sale occurred (YYYY-MM-DD)"
        nullable: false
      - name: store_id
        type: string
        description: "Unique identifier for the retail store"
        nullable: false
      - name: store_name
        type: string
        description: "Human-readable name of the retail store"
        nullable: false
      - name: customer_name
        type: string
        description: "Full name of the customer"
        nullable: true
      - name: customer_email
        type: string
        description: "Email address of the customer"
        nullable: true
      - name: product_sku
        type: string
        description: "Stock keeping unit identifier for the product"
        nullable: false
      - name: product_name
        type: string
        description: "Human-readable name of the product"
        nullable: false
      - name: category
        type: string
        description: "Product category classification"
        nullable: false
      - name: quantity
        type: integer
        description: "Number of units sold in this transaction"
        nullable: false
      - name: unit_price
        type: float
        description: "Price per unit before discount"
        nullable: false
      - name: discount_pct
        type: float
        description: "Discount percentage applied (0-100)"
        nullable: false
      - name: total_amount
        type: float
        description: "Final transaction amount after discount"
        nullable: false
      - name: payment_method
        type: string
        description: "Payment method used (credit_card, debit_card, cash, mobile_pay)"
        nullable: false
      - name: region
        type: string
        description: "Geographic region of the store"
        nullable: false

  # Partitioning for Bronze zone — by ingestion date
  partitioning:
    type: ingestion_date
    format: "YYYY-MM-DD"

  # Data zone targets
  zones:
    bronze:
      path: "s3://${DATA_LAKE_BUCKET}/bronze/daily_sales/"
      format: csv
    silver:
      path: "s3://${DATA_LAKE_BUCKET}/silver/daily_sales/"
      format: iceberg
      # Silver is ALWAYS Iceberg on S3 Tables — no exceptions
      catalog_database: "daily_sales_silver"
      catalog_table: "daily_sales"
    gold:
      path: "s3://${DATA_LAKE_BUCKET}/gold/daily_sales/"
      format: iceberg
      catalog_database: "daily_sales_gold"
      # Star schema: fact + dimension tables
      tables:
        - fact_sales
        - dim_store
        - dim_product
        - dim_date
