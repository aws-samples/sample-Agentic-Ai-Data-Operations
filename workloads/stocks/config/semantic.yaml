# Semantic layer configuration for stocks workload
# SINGLE SOURCE OF TRUTH - combines technical metadata + business context
# Generated by Metadata Agent

workload: stocks
domain: finance
use_case: ad_hoc_analytics
schema_format: flat_denormalized
compliance:
  - GDPR

# =============================================================================
# TABLES
# =============================================================================

tables:
  # ---------------------------------------------------------------------------
  # STOCKS - Single flat table (ad-hoc analytics, no star schema)
  # ---------------------------------------------------------------------------
  - name: stocks
    description: "Public market stock reference data with pricing, fundamentals, and trading metadata for ad-hoc analytics"
    table_type: flat
    primary_key: ticker
    grain: "One row per unique stock ticker symbol"

    columns:
      # Identifier (Primary Key)
      - name: ticker
        type: string
        role: identifier
        nullable: false
        description: "Stock ticker symbol (e.g., AAPL, MSFT)"
        pii_classification: null
        sample_values: ["AAPL", "MSFT", "GOOGL", "AMZN", "TSLA"]
        constraints:
          - unique
          - not_null

      # Dimensions
      - name: company_name
        type: string
        role: dimension
        nullable: false
        description: "Legal company name as listed on exchange"
        pii_classification: null  # Public company name, not personal data
        sample_values: ["Apple Inc.", "Microsoft Corporation", "Alphabet Inc."]

      - name: sector
        type: string
        role: dimension
        nullable: false
        description: "Business sector classification (e.g., Technology, Healthcare)"
        pii_classification: null
        sample_values: ["Technology", "Healthcare", "Financial", "Consumer Cyclical"]
        distinct_count: 8

      - name: industry
        type: string
        role: dimension
        nullable: false
        description: "Industry classification within sector"
        pii_classification: null
        sample_values: ["Software", "Semiconductors", "Banking", "Drug Manufacturers"]
        distinct_count: 27

      - name: exchange
        type: string
        role: dimension
        nullable: false
        description: "Stock exchange where traded (NASDAQ or NYSE)"
        pii_classification: null
        sample_values: ["NASDAQ", "NYSE"]
        distinct_count: 2

      # Measures
      - name: market_cap_billions
        type: decimal(12,2)
        role: measure
        nullable: false
        description: "Market capitalization in billions of USD"
        default_aggregation: sum
        pii_classification: null
        unit: "USD billions"

      - name: current_price
        type: decimal(10,2)
        role: measure
        nullable: false
        description: "Current trading price in USD per share"
        default_aggregation: avg
        pii_classification: null
        unit: "USD"

      - name: price_52w_high
        type: decimal(10,2)
        role: measure
        nullable: false
        description: "52-week high price in USD"
        default_aggregation: max
        pii_classification: null
        unit: "USD"

      - name: price_52w_low
        type: decimal(10,2)
        role: measure
        nullable: false
        description: "52-week low price in USD"
        default_aggregation: min
        pii_classification: null
        unit: "USD"

      - name: pe_ratio
        type: decimal(8,2)
        role: measure
        nullable: false
        description: "Price-to-earnings ratio — negative values indicate net losses"
        default_aggregation: avg
        pii_classification: null

      - name: dividend_yield
        type: decimal(6,4)
        role: measure
        nullable: false
        description: "Annual dividend yield as percentage (0.00 = no dividend)"
        default_aggregation: avg
        pii_classification: null
        unit: "percentage"

      - name: beta
        type: decimal(6,3)
        role: measure
        nullable: false
        description: "Stock volatility relative to market (beta coefficient). >1 = more volatile than market"
        default_aggregation: avg
        pii_classification: null

      - name: avg_volume_millions
        type: decimal(10,2)
        role: measure
        nullable: false
        description: "Average daily trading volume in millions of shares"
        default_aggregation: avg
        pii_classification: null
        unit: "millions of shares"

      # Temporal
      - name: listing_date
        type: date
        role: temporal
        nullable: false
        description: "Date when stock was first listed on exchange (IPO date)"
        pii_classification: null
        date_format: "YYYY-MM-DD"

    # GDPR metadata columns — added to Silver/Gold zone tables
    gdpr_metadata_columns:
      - name: consent_given
        type: boolean
        description: "Whether data subject has given consent (always true for public market data)"
        default_value: true

      - name: consent_timestamp
        type: timestamp
        description: "Timestamp when consent was recorded"

      - name: is_deleted
        type: boolean
        description: "Soft-delete flag for right-to-erasure requests"
        default_value: false

      - name: deletion_requested_at
        type: timestamp
        description: "Timestamp of deletion request (null if no request)"
        default_value: null

      - name: data_subject_id
        type: string
        description: "Identifier for the data subject (N/A for public market data)"
        default_value: null

# =============================================================================
# BUSINESS TERMS & SYNONYMS
# =============================================================================

business_terms:
  - term: "market_cap"
    synonyms: ["market_capitalization", "valuation", "company_size", "market_value"]
    sql_expression: "market_cap_billions"
    description: "Total market value of a company in billions of USD (share price x shares outstanding)"

  - term: "price_range"
    synonyms: ["52_week_range", "trading_range", "price_band", "high_low"]
    sql_expression: "price_52w_high - price_52w_low"
    description: "Difference between 52-week high and low prices"

  - term: "valuation"
    synonyms: ["pe", "p_e", "earnings_multiple", "price_to_earnings"]
    sql_expression: "pe_ratio"
    description: "Price-to-earnings ratio indicating how much investors pay per dollar of earnings"

  - term: "yield"
    synonyms: ["dividend", "income", "payout", "dividend_rate"]
    sql_expression: "dividend_yield"
    description: "Annual dividend yield as a percentage of share price"

  - term: "volatility"
    synonyms: ["risk", "beta_coefficient", "market_sensitivity", "systematic_risk"]
    sql_expression: "beta"
    description: "Stock's sensitivity to market movements (beta). >1 = more volatile, <1 = less volatile"

  - term: "liquidity"
    synonyms: ["volume", "trading_volume", "daily_volume", "shares_traded"]
    sql_expression: "avg_volume_millions"
    description: "Average daily trading volume in millions of shares — proxy for liquidity"

# =============================================================================
# DIMENSION HIERARCHIES
# =============================================================================

dimension_hierarchies:
  - name: equity_classification
    description: "Stock classification hierarchy from broad sector to specific ticker"
    levels:
      - level: 1
        name: sector
        column: sector
        description: "Broad business sector (e.g., Technology, Healthcare)"

      - level: 2
        name: industry
        column: industry
        description: "Industry within sector (e.g., Software, Semiconductors)"

      - level: 3
        name: ticker
        column: ticker
        description: "Individual stock ticker symbol"

  - name: exchange_listing
    description: "Exchange-based hierarchy for market-level analysis"
    levels:
      - level: 1
        name: exchange
        column: exchange
        description: "Stock exchange (NASDAQ, NYSE)"

      - level: 2
        name: sector
        column: sector
        description: "Business sector within exchange"

      - level: 3
        name: ticker
        column: ticker
        description: "Individual stock within sector"

# =============================================================================
# DEFAULT FILTERS (Business Logic)
# =============================================================================

default_filters:
  - name: positive_pe_only
    description: "Exclude stocks with negative P/E ratio (unprofitable companies)"
    filter: "pe_ratio > 0"
    applies_to_tables: ["stocks"]

  - name: dividend_payers_only
    description: "Include only stocks that pay dividends"
    filter: "dividend_yield > 0"
    applies_to_tables: ["stocks"]

  - name: large_cap_only
    description: "Include only large-cap stocks (market cap >= $100B)"
    filter: "market_cap_billions >= 100"
    applies_to_tables: ["stocks"]

  - name: gdpr_not_deleted
    description: "Exclude soft-deleted records (GDPR right to erasure)"
    filter: "is_deleted = false"
    applies_to_tables: ["stocks"]

# =============================================================================
# TIME INTELLIGENCE
# =============================================================================

time_intelligence:
  fiscal_year_start: "01-01"  # Calendar year
  week_start_day: "sunday"
  timezone: "UTC"  # Storage timezone
  display_timezone: "US/Eastern"  # Display timezone
  data_freshness_hours: 720  # Monthly refresh — stale after 30 days

  temporal_columns:
    - table: stocks
      column: listing_date
      type: date
      description: "Stock IPO / listing date"

# =============================================================================
# SEED QUESTIONS (NLP Query Examples)
# =============================================================================

seed_questions:
  - question: "What are the top 10 stocks by market cap?"
    sql: "SELECT ticker, company_name, market_cap_billions FROM stocks ORDER BY market_cap_billions DESC LIMIT 10"
    explanation: "Rank all stocks by market capitalization descending and return the top 10"

  - question: "Which sectors have the highest average P/E ratio?"
    sql: "SELECT sector, AVG(pe_ratio) AS avg_pe, COUNT(ticker) AS stock_count FROM stocks WHERE pe_ratio > 0 GROUP BY sector ORDER BY avg_pe DESC"
    explanation: "Average P/E ratio by sector, excluding unprofitable companies with negative P/E"

  - question: "Show me high-dividend stocks with low volatility"
    sql: "SELECT ticker, company_name, dividend_yield, beta FROM stocks WHERE dividend_yield > 2.0 AND beta < 1.0 ORDER BY dividend_yield DESC LIMIT 10"
    explanation: "Stocks yielding above 2% with beta below 1 — defensive income plays"

  - question: "What is the total market cap by exchange?"
    sql: "SELECT exchange, SUM(market_cap_billions) AS total_market_cap, COUNT(ticker) AS stock_count FROM stocks GROUP BY exchange ORDER BY total_market_cap DESC"
    explanation: "Aggregate market capitalization per exchange"

  - question: "Which stocks are trading closest to their 52-week high?"
    sql: "SELECT ticker, company_name, current_price, price_52w_high, ROUND((current_price / price_52w_high) * 100, 2) AS pct_of_high FROM stocks ORDER BY pct_of_high DESC LIMIT 10"
    explanation: "Stocks trading near their 52-week high may indicate momentum or overvaluation"

  - question: "Show me the most volatile stocks"
    sql: "SELECT ticker, company_name, beta, avg_volume_millions FROM stocks ORDER BY beta DESC LIMIT 10"
    explanation: "Stocks with highest beta coefficient, indicating greatest market sensitivity"

# =============================================================================
# DATA STEWARDSHIP
# =============================================================================

data_stewardship:
  owner: "Market Data Team"
  steward: "Data Governance"
  contact: "market-data@firm.example.com"

  update_schedule:
    frequency: "monthly"
    time: "09:00 AM"
    timezone: "US/Eastern"

  data_quality_owner: "Data Governance"
  compliance_owner: "Data Protection Officer (GDPR)"

# =============================================================================
# GDPR DATA SENSITIVITY SUMMARY
# =============================================================================

data_sensitivity:
  overall: LOW
  pii_detected: false
  lf_tags:
    Data_Sensitivity: LOW
    PII_Classification: NONE
  notes: "All columns contain public market data. No personal data detected. GDPR governance applied as organizational policy."
