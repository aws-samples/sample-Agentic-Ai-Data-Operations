# Transformations configuration for stocks workload
# Defines Bronze -> Silver -> Gold transformations
# Generated by Transformation Agent

workload: stocks
version: "1.0"
domain: finance
compliance:
  - GDPR  # All Data_Sensitivity=LOW, no PII detected

# =============================================================================
# BRONZE -> SILVER: Cleaning & Validation
# =============================================================================

bronze_to_silver:
  # ---------------------------------------------------------------------------
  # STOCKS - Single flat table
  # ---------------------------------------------------------------------------
  stocks:
    description: "Clean and validate stock reference data, add GDPR metadata columns"
    source:
      path: "s3://${DATA_LAKE_BUCKET}/bronze/stocks/"
      format: csv

    deduplication:
      enabled: true
      key: ticker
      strategy: keep_last  # Keep most recent record based on implicit ordering
      sort_by: null  # No explicit sort column, rely on file order

    validations:
      - column: ticker
        rule: not_null
        action: reject
        reason: "Ticker is the primary key - cannot be null"

      - column: company_name
        rule: not_null
        action: reject
        reason: "Company name is required for reference data"

      - column: sector
        rule: not_null
        action: reject
        reason: "Sector classification required for analytics"

      - column: industry
        rule: not_null
        action: reject
        reason: "Industry classification required for analytics"

      - column: exchange
        rule: not_null
        action: reject
        reason: "Exchange is required for reference data"

      - column: market_cap_billions
        rule: greater_than
        value: 0
        action: quarantine
        reason: "Market cap must be positive"

      - column: current_price
        rule: greater_than
        value: 0
        action: quarantine
        reason: "Stock price must be positive"

      - column: price_52w_high
        rule: greater_than_or_equal
        value: current_price
        action: quarantine
        reason: "52-week high cannot be less than current price"

      - column: price_52w_low
        rule: less_than_or_equal
        value: current_price
        action: quarantine
        reason: "52-week low cannot be greater than current price"

    type_conversions:
      - column: listing_date
        from: string
        to: date
        format: "%Y-%m-%d"

      - column: market_cap_billions
        from: string
        to: decimal
        precision: 12
        scale: 2

      - column: current_price
        from: string
        to: decimal
        precision: 10
        scale: 2

      - column: price_52w_high
        from: string
        to: decimal
        precision: 10
        scale: 2

      - column: price_52w_low
        from: string
        to: decimal
        precision: 10
        scale: 2

      - column: pe_ratio
        from: string
        to: decimal
        precision: 8
        scale: 2

      - column: dividend_yield
        from: string
        to: decimal
        precision: 6
        scale: 4

      - column: beta
        from: string
        to: decimal
        precision: 6
        scale: 3

      - column: avg_volume_millions
        from: string
        to: decimal
        precision: 10
        scale: 2

    # GDPR metadata columns added during Silver transformation
    gdpr_columns:
      - name: consent_given
        type: boolean
        default: true

      - name: consent_timestamp
        type: timestamp
        default: current_timestamp

      - name: is_deleted
        type: boolean
        default: false

      - name: deletion_requested_at
        type: timestamp
        default: null

      - name: data_subject_id
        type: string
        default: null

    quarantine:
      enabled: true
      path: "s3://${DATA_LAKE_BUCKET}/quarantine/stocks/"
      retention_days: 30

    output:
      format: iceberg
      path: "s3://${DATA_LAKE_BUCKET}/silver/stocks/"
      partition_by: []  # Only 50 rows - no partitioning needed
      table_properties:
        table_type: iceberg
        write_mode: overwrite
        format_version: 2

# =============================================================================
# SILVER -> GOLD: Flat Denormalized Enrichment
# =============================================================================

silver_to_gold:
  # ---------------------------------------------------------------------------
  # STOCKS_ANALYTICS - Flat denormalized table (NOT star schema)
  # ---------------------------------------------------------------------------
  stocks_analytics:
    description: "Flat denormalized analytics table - all Silver columns + computed columns for ad-hoc analytics"
    source:
      table: silver.stocks_db.stocks
      format: iceberg

    type: flat
    grain: "One row per unique stock ticker symbol"

    columns: all  # Include all columns from Silver

    computed_columns:
      - name: price_52w_range
        expression: "price_52w_high - price_52w_low"
        type: decimal(10,2)
        description: "52-week price range (high minus low)"

      - name: price_pct_from_high
        expression: "((current_price - price_52w_high) / price_52w_high) * 100"
        type: decimal(8,4)
        description: "Current price as percentage distance from 52-week high (always <= 0)"

      - name: market_cap_category
        expression: >
          CASE
            WHEN market_cap_billions >= 200 THEN 'Mega Cap'
            WHEN market_cap_billions >= 10 THEN 'Large Cap'
            WHEN market_cap_billions >= 2 THEN 'Mid Cap'
            ELSE 'Small Cap'
          END
        type: string
        description: "Market capitalization category based on market_cap_billions"

      - name: yield_category
        expression: >
          CASE
            WHEN dividend_yield >= 4 THEN 'High Yield'
            WHEN dividend_yield >= 2 THEN 'Moderate Yield'
            WHEN dividend_yield > 0 THEN 'Low Yield'
            ELSE 'No Yield'
          END
        type: string
        description: "Dividend yield category for income analysis"

      - name: volatility_category
        expression: >
          CASE
            WHEN beta >= 1.5 THEN 'High Volatility'
            WHEN beta >= 1.0 THEN 'Market Volatility'
            WHEN beta >= 0.5 THEN 'Low Volatility'
            ELSE 'Defensive'
          END
        type: string
        description: "Volatility category based on beta coefficient"

    output:
      format: iceberg
      path: "s3://${DATA_LAKE_BUCKET}/gold/stocks/stocks_analytics/"
      partition_by: []  # Only 50 rows - no partitioning needed
      table_properties:
        table_type: iceberg
        write_mode: overwrite
        format_version: 2

# =============================================================================
# LINEAGE TRACKING
# =============================================================================

lineage:
  enabled: true
  output_path: "s3://${DATA_LAKE_BUCKET}/lineage/stocks/"
  format: json
  track_column_level: true
  track_transformations: true
  include_row_counts: true
  include_quality_metrics: true
  hash_algorithm: sha256

# =============================================================================
# TRANSFORMATION METADATA
# =============================================================================

metadata:
  created_by: "Transformation Agent"
  created_at: "2026-03-24"
  last_modified: "2026-03-24"
  version: "1.0"
  schema_registry: "AWS Glue Data Catalog"
