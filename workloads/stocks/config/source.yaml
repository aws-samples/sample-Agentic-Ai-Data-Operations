# Source configuration for stocks workload
# Generated by Metadata Agent

source:
  name: stocks
  type: s3
  format: csv
  location: s3://${DATA_LAKE_BUCKET}/stocks/
  partition_pattern: "YYYY-MM"

  # Authentication
  credentials:
    type: iam_role
    role_arn_secret: "arn:aws:secretsmanager:us-east-1:${AWS_ACCOUNT_ID}:secret:data-onboarding/s3-reader-role"

  # Update schedule
  frequency: monthly
  expected_arrival_time: "09:00:00"
  timezone: "US/Eastern"

  # Tables
  tables:
    - name: stocks
      file_pattern: "stocks.csv"
      primary_key: ticker
      row_count_expected: 50
      description: "Public market stock reference data — ticker, price, fundamentals, and trading metadata"

  # CSV options
  csv_options:
    delimiter: ","
    header: true
    encoding: "utf-8"
    quote_char: "\""
    escape_char: "\\"
    null_value: ""

  # Compliance — GDPR (no PII detected, but GDPR governance applied)
  compliance:
    - GDPR

  # GDPR default: 365 days for data, 2555 days (7 years) for audit logs
  retention_days: 365
  audit_log_retention_days: 2555

  # Encryption
  encryption:
    kms_key_alias: "alias/stocks-gdpr-key"
    at_rest: AES-256
    in_transit: TLS-1.3
    key_rotation: annual

  # Data quality expectations
  quality_expectations:
    - no_duplicate_primary_keys
    - no_null_in_required_fields
