# Semantic layer configuration for financial_portfolios workload
# SINGLE SOURCE OF TRUTH - combines technical metadata + business context
# Generated by Metadata Agent

workload: financial_portfolios
domain: finance
use_case: reporting_and_dashboards
schema_format: star_schema
compliance:
  - SOX

# =============================================================================
# TABLES
# =============================================================================

tables:
  # ---------------------------------------------------------------------------
  # STOCKS - Dimension Table (Reference Data)
  # ---------------------------------------------------------------------------
  - name: stocks
    description: "Reference data for publicly traded stocks - dimension table for equity master data"
    table_type: dimension
    primary_key: ticker
    grain: "One row per unique stock ticker symbol"
    scd_type: 1  # Current state only

    columns:
      - name: ticker
        type: string
        role: identifier
        nullable: false
        description: "Stock ticker symbol (e.g., AAPL, MSFT)"
        pii_classification: null
        sample_values: ["AAPL", "MSFT", "GOOGL", "AMZN", "TSLA"]
        constraints:
          - unique
          - not_null

      - name: company_name
        type: string
        role: dimension
        nullable: false
        description: "Legal company name"
        pii_classification:
          type: NAME
          sensitivity: LOW
          reason: "Public company name - low sensitivity"
        sample_values: ["Apple Inc.", "Microsoft Corporation", "Alphabet Inc."]

      - name: sector
        type: string
        role: dimension
        nullable: false
        description: "Business sector classification (e.g., Technology, Healthcare)"
        pii_classification: null
        sample_values: ["Technology", "Healthcare", "Financials", "Consumer Discretionary"]
        distinct_count: 8

      - name: industry
        type: string
        role: dimension
        nullable: false
        description: "Industry classification within sector"
        pii_classification: null
        sample_values: ["Software", "Semiconductors", "Banks", "Pharmaceuticals"]
        distinct_count: 27

      - name: exchange
        type: string
        role: dimension
        nullable: false
        description: "Stock exchange where traded (NASDAQ or NYSE)"
        pii_classification: null
        sample_values: ["NASDAQ", "NYSE"]
        distinct_count: 2

      - name: market_cap_billions
        type: decimal(12,2)
        role: measure
        nullable: false
        description: "Market capitalization in billions of USD"
        default_aggregation: sum
        pii_classification: null
        unit: "USD billions"

      - name: current_price
        type: decimal(10,2)
        role: measure
        nullable: false
        description: "Current trading price in USD per share"
        default_aggregation: avg
        pii_classification: null
        unit: "USD"

      - name: price_52w_high
        type: decimal(10,2)
        role: measure
        nullable: false
        description: "52-week high price"
        default_aggregation: max
        pii_classification: null
        unit: "USD"

      - name: price_52w_low
        type: decimal(10,2)
        role: measure
        nullable: false
        description: "52-week low price"
        default_aggregation: min
        pii_classification: null
        unit: "USD"

      - name: pe_ratio
        type: decimal(8,2)
        role: measure
        nullable: false
        description: "Price-to-earnings ratio"
        default_aggregation: avg
        pii_classification: null

      - name: dividend_yield
        type: decimal(6,4)
        role: measure
        nullable: false
        description: "Annual dividend yield as percentage"
        default_aggregation: avg
        pii_classification: null
        unit: "percentage"

      - name: beta
        type: decimal(6,3)
        role: measure
        nullable: false
        description: "Stock volatility relative to market (beta coefficient)"
        default_aggregation: avg
        pii_classification: null

      - name: avg_volume_millions
        type: decimal(10,2)
        role: measure
        nullable: false
        description: "Average daily trading volume in millions of shares"
        default_aggregation: avg
        pii_classification: null
        unit: "millions of shares"

      - name: listing_date
        type: date
        role: temporal
        nullable: false
        description: "Date when stock was first listed on exchange"
        pii_classification: null
        date_format: "YYYY-MM-DD"

    relationships:
      - target_table: positions
        type: one_to_many
        join_column: ticker
        description: "Each stock can appear in multiple portfolio positions"
        cardinality: "1:N"

  # ---------------------------------------------------------------------------
  # PORTFOLIOS - Dimension Table
  # ---------------------------------------------------------------------------
  - name: portfolios
    description: "Investment portfolios managed by the firm - dimension table for portfolio master data"
    table_type: dimension
    primary_key: portfolio_id
    grain: "One row per portfolio"
    scd_type: 1  # Current state only

    columns:
      - name: portfolio_id
        type: string
        role: identifier
        nullable: false
        description: "Unique portfolio identifier (e.g., PORT001)"
        pii_classification: null
        sample_values: ["PORT001", "PORT002", "PORT003"]
        constraints:
          - unique
          - not_null

      - name: portfolio_name
        type: string
        role: dimension
        nullable: false
        description: "Portfolio display name"
        pii_classification:
          type: NAME
          sensitivity: LOW
          reason: "Portfolio name - low sensitivity"
        sample_values: ["Growth Fund", "Income Portfolio", "Tech Sector"]

      - name: manager_name
        type: string
        role: dimension
        nullable: false
        description: "Portfolio manager name"
        pii_classification:
          type: NAME
          sensitivity: MEDIUM
          reason: "Employee name - SOX compliance requires audit trail"
          compliance_tags: ["SOX"]
        sample_values: ["Sarah Johnson", "Michael Chen", "Emily Rodriguez"]

      - name: strategy
        type: string
        role: dimension
        nullable: false
        description: "Investment strategy type"
        pii_classification: null
        sample_values: ["Growth", "Value", "Balanced", "Income", "Aggressive Growth"]
        distinct_count: 11

      - name: risk_level
        type: string
        role: dimension
        nullable: false
        description: "Portfolio risk classification"
        pii_classification: null
        sample_values: ["Conservative", "Moderate", "Moderate-Aggressive", "Aggressive", "Very Aggressive"]
        distinct_count: 5

      - name: benchmark
        type: string
        role: dimension
        nullable: false
        description: "Benchmark index for performance comparison"
        pii_classification: null
        sample_values: ["S&P 500", "NASDAQ 100", "Russell 2000"]

      - name: inception_date
        type: date
        role: temporal
        nullable: false
        description: "Date when portfolio was created"
        pii_classification: null
        date_format: "YYYY-MM-DD"

      - name: total_value
        type: decimal(15,2)
        role: measure
        nullable: false
        description: "Total portfolio market value in USD"
        default_aggregation: sum
        pii_classification: null
        unit: "USD"

      - name: cash_balance
        type: decimal(15,2)
        role: measure
        nullable: false
        description: "Uninvested cash balance in USD"
        default_aggregation: sum
        pii_classification: null
        unit: "USD"

      - name: num_positions
        type: integer
        role: measure
        nullable: false
        description: "Number of stock positions held"
        default_aggregation: sum
        pii_classification: null

      - name: avg_position_size
        type: decimal(15,2)
        role: measure
        nullable: false
        description: "Average position size in USD"
        default_aggregation: avg
        pii_classification: null
        unit: "USD"

      - name: largest_position_pct
        type: decimal(6,2)
        role: measure
        nullable: false
        description: "Percentage of portfolio in largest single position"
        default_aggregation: max
        pii_classification: null
        unit: "percentage"

      - name: status
        type: string
        role: dimension
        nullable: false
        description: "Portfolio status (Active, Closed, Suspended)"
        pii_classification: null
        sample_values: ["Active", "Closed", "Suspended"]

      - name: rebalance_frequency
        type: string
        role: dimension
        nullable: false
        description: "How often portfolio is rebalanced"
        pii_classification: null
        sample_values: ["Monthly", "Quarterly", "Semi-Annual", "Annual"]

      - name: last_rebalance_date
        type: date
        role: temporal
        nullable: false
        description: "Date of most recent rebalancing"
        pii_classification: null
        date_format: "YYYY-MM-DD"

    relationships:
      - target_table: positions
        type: one_to_many
        join_column: portfolio_id
        description: "Each portfolio contains multiple stock positions"
        cardinality: "1:N"

  # ---------------------------------------------------------------------------
  # POSITIONS - Fact Table
  # ---------------------------------------------------------------------------
  - name: positions
    description: "Current stock holdings across all portfolios - fact table for portfolio positions"
    table_type: fact
    primary_key: position_id
    grain: "One row per portfolio-ticker combination (current position snapshot)"
    scd_type: 1  # Current state only

    columns:
      # Primary Key
      - name: position_id
        type: string
        role: identifier
        nullable: false
        description: "Unique position identifier"
        pii_classification: null
        sample_values: ["POS001", "POS002", "POS003"]
        constraints:
          - unique
          - not_null

      # Foreign Keys
      - name: portfolio_id
        type: string
        role: identifier
        nullable: false
        description: "Foreign key to portfolios table"
        pii_classification: null
        sample_values: ["PORT001", "PORT002", "PORT003"]
        constraints:
          - not_null
          - foreign_key

      - name: ticker
        type: string
        role: identifier
        nullable: false
        description: "Foreign key to stocks table"
        pii_classification: null
        sample_values: ["AAPL", "MSFT", "GOOGL"]
        constraints:
          - not_null
          - foreign_key

      # Measures
      - name: shares
        type: decimal(15,4)
        role: measure
        nullable: false
        description: "Number of shares held"
        default_aggregation: sum
        pii_classification: null
        constraints:
          - positive

      - name: cost_basis
        type: decimal(15,2)
        role: measure
        nullable: false
        description: "Total cost basis in USD (shares × purchase_price)"
        default_aggregation: sum
        pii_classification: null
        unit: "USD"
        derived_from: "shares * purchase_price"

      - name: purchase_price
        type: decimal(10,2)
        role: measure
        nullable: false
        description: "Average purchase price per share in USD"
        default_aggregation: avg
        pii_classification: null
        unit: "USD"

      - name: current_price
        type: decimal(10,2)
        role: measure
        nullable: false
        description: "Current market price per share in USD"
        default_aggregation: avg
        pii_classification: null
        unit: "USD"

      - name: market_value
        type: decimal(15,2)
        role: measure
        nullable: false
        description: "Current market value in USD (shares × current_price)"
        default_aggregation: sum
        pii_classification: null
        unit: "USD"
        derived_from: "shares * current_price"

      - name: unrealized_gain_loss
        type: decimal(15,2)
        role: measure
        nullable: false
        description: "Unrealized gain or loss in USD (market_value - cost_basis)"
        default_aggregation: sum
        pii_classification: null
        unit: "USD"
        derived_from: "market_value - cost_basis"

      - name: unrealized_gain_loss_pct
        type: decimal(8,4)
        role: measure
        nullable: false
        description: "Unrealized gain or loss as percentage"
        default_aggregation: weighted_avg
        weighted_by: market_value
        pii_classification: null
        unit: "percentage"
        derived_from: "(unrealized_gain_loss / cost_basis) * 100"

      - name: weight_pct
        type: decimal(6,2)
        role: measure
        nullable: false
        description: "Position weight as percentage of portfolio total"
        default_aggregation: sum
        pii_classification: null
        unit: "percentage"

      # Temporal Columns
      - name: entry_date
        type: date
        role: temporal
        nullable: false
        description: "Date when position was first opened"
        pii_classification: null
        date_format: "YYYY-MM-DD"

      - name: last_updated
        type: timestamp
        role: temporal
        nullable: false
        description: "Timestamp of last price/value update"
        pii_classification: null
        timestamp_format: "YYYY-MM-DD HH:mm:ss"

      - name: holding_period_days
        type: integer
        role: measure
        nullable: false
        description: "Number of days position has been held"
        default_aggregation: avg
        pii_classification: null
        derived_from: "DATEDIFF(day, entry_date, last_updated)"

      # Dimensions (denormalized from stocks)
      - name: sector
        type: string
        role: dimension
        nullable: false
        description: "Stock sector (denormalized from stocks table)"
        pii_classification: null
        sample_values: ["Technology", "Healthcare", "Financials"]

      - name: position_status
        type: string
        role: dimension
        nullable: false
        description: "Position status (Open, Closed, Partial)"
        pii_classification: null
        sample_values: ["Open", "Closed", "Partial"]

    relationships:
      - target_table: portfolios
        type: many_to_one
        join_column: portfolio_id
        description: "Each position belongs to one portfolio"
        cardinality: "N:1"

      - target_table: stocks
        type: many_to_one
        join_column: ticker
        description: "Each position references one stock"
        cardinality: "N:1"

# =============================================================================
# BUSINESS TERMS & SYNONYMS
# =============================================================================

business_terms:
  - term: "unrealized_gain"
    synonyms: ["paper_profit", "mark_to_market_gain", "open_position_pl", "mtm_gain"]
    sql_expression: "market_value - cost_basis"
    description: "Profit or loss on open positions not yet sold (mark-to-market)"

  - term: "portfolio_value"
    synonyms: ["total_value", "aum", "assets_under_management", "portfolio_nav"]
    sql_expression: "SUM(market_value) + cash_balance"
    description: "Total portfolio value including invested positions and cash"

  - term: "return"
    synonyms: ["performance", "gain", "profit", "investment_return"]
    sql_expression: "(unrealized_gain_loss / cost_basis) * 100"
    description: "Investment return as percentage of cost basis"

  - term: "allocation"
    synonyms: ["weight", "exposure", "position_size"]
    sql_expression: "(market_value / portfolio_total_value) * 100"
    description: "Position size as percentage of portfolio"

  - term: "concentration"
    synonyms: ["largest_holding", "top_position", "max_weight"]
    sql_expression: "MAX(weight_pct)"
    description: "Percentage of portfolio in largest single position"

# =============================================================================
# DIMENSION HIERARCHIES
# =============================================================================

dimension_hierarchies:
  - name: equity_classification
    description: "Stock classification hierarchy from broad sector to specific ticker"
    levels:
      - level: 1
        name: sector
        column: sector
        description: "Broad business sector (e.g., Technology, Healthcare)"

      - level: 2
        name: industry
        column: industry
        description: "Industry within sector (e.g., Software, Semiconductors)"

      - level: 3
        name: ticker
        column: ticker
        description: "Individual stock ticker symbol"

  - name: portfolio_management
    description: "Portfolio hierarchy from manager to individual positions"
    levels:
      - level: 1
        name: manager
        column: manager_name
        description: "Portfolio manager responsible for strategy"

      - level: 2
        name: strategy
        column: strategy
        description: "Investment strategy (Growth, Value, etc.)"

      - level: 3
        name: risk_level
        column: risk_level
        description: "Risk classification (Conservative to Aggressive)"

      - level: 4
        name: portfolio
        column: portfolio_id
        description: "Individual portfolio identifier"

  - name: temporal
    description: "Time-based analysis hierarchy"
    levels:
      - level: 1
        name: year
        column: entry_date
        extraction: "YEAR(entry_date)"

      - level: 2
        name: quarter
        column: entry_date
        extraction: "QUARTER(entry_date)"

      - level: 3
        name: month
        column: entry_date
        extraction: "MONTH(entry_date)"

      - level: 4
        name: date
        column: entry_date
        extraction: "entry_date"

# =============================================================================
# DEFAULT FILTERS (Business Logic)
# =============================================================================

default_filters:
  - name: active_portfolios_only
    description: "Exclude closed or suspended portfolios from reporting"
    filter: "portfolios.status = 'Active'"
    applies_to_tables: ["portfolios", "positions"]

  - name: open_positions_only
    description: "Only include currently open positions"
    filter: "positions.position_status = 'Open'"
    applies_to_tables: ["positions"]

  - name: positive_value_positions
    description: "Exclude zero or negative value positions"
    filter: "positions.market_value > 0 AND positions.shares > 0"
    applies_to_tables: ["positions"]

# =============================================================================
# TIME INTELLIGENCE
# =============================================================================

time_intelligence:
  fiscal_year_start: "01-01"  # Calendar year
  week_start_day: "sunday"
  timezone: "UTC"  # Storage timezone
  display_timezone: "US/Eastern"  # Display timezone
  data_freshness_hours: 24  # Stale after 24 hours

  temporal_columns:
    - table: stocks
      column: listing_date
      type: date
      description: "Stock IPO date"

    - table: portfolios
      column: inception_date
      type: date
      description: "Portfolio creation date"

    - table: portfolios
      column: last_rebalance_date
      type: date
      description: "Most recent rebalancing"

    - table: positions
      column: entry_date
      type: date
      description: "Position open date"

    - table: positions
      column: last_updated
      type: timestamp
      description: "Last price update timestamp"

# =============================================================================
# SEED QUESTIONS (NLP Query Examples)
# =============================================================================

seed_questions:
  - question: "What is the total portfolio value?"
    sql: "SELECT SUM(market_value) + SUM(cash_balance) AS total_value FROM positions JOIN portfolios ON positions.portfolio_id = portfolios.portfolio_id WHERE portfolios.status = 'Active'"
    explanation: "Sum of all position market values plus uninvested cash across active portfolios"

  - question: "What are the top 5 holdings by value?"
    sql: "SELECT ticker, SUM(market_value) AS total_value FROM positions WHERE position_status = 'Open' GROUP BY ticker ORDER BY total_value DESC LIMIT 5"
    explanation: "Aggregate position values across all portfolios, rank by total market value"

  - question: "Show me unrealized gains by sector"
    sql: "SELECT sector, SUM(unrealized_gain_loss) AS total_gain, AVG(unrealized_gain_loss_pct) AS avg_return FROM positions WHERE position_status = 'Open' GROUP BY sector ORDER BY total_gain DESC"
    explanation: "Total and average percentage gain/loss grouped by business sector"

  - question: "Which portfolios are underperforming?"
    sql: "SELECT portfolio_id, portfolio_name, SUM(unrealized_gain_loss) AS total_gain FROM positions JOIN portfolios ON positions.portfolio_id = portfolios.portfolio_id WHERE portfolios.status = 'Active' GROUP BY portfolio_id, portfolio_name HAVING total_gain < 0 ORDER BY total_gain ASC"
    explanation: "Portfolios with negative total unrealized gains"

  - question: "What is Sarah Johnson's portfolio performance?"
    sql: "SELECT portfolios.portfolio_name, SUM(market_value) AS total_value, SUM(unrealized_gain_loss) AS total_gain, (SUM(unrealized_gain_loss) / SUM(cost_basis)) * 100 AS return_pct FROM positions JOIN portfolios ON positions.portfolio_id = portfolios.portfolio_id WHERE portfolios.manager_name = 'Sarah Johnson' AND portfolios.status = 'Active' GROUP BY portfolios.portfolio_name"
    explanation: "Aggregate performance metrics for all portfolios managed by specified person"

  - question: "Show tech sector concentration across portfolios"
    sql: "SELECT portfolio_id, SUM(weight_pct) AS tech_weight_pct FROM positions WHERE sector = 'Technology' AND position_status = 'Open' GROUP BY portfolio_id ORDER BY tech_weight_pct DESC"
    explanation: "Total weight percentage of Technology sector holdings per portfolio"

# =============================================================================
# DATA STEWARDSHIP
# =============================================================================

data_stewardship:
  owner: "Portfolio Management Team"
  steward: "Risk Analytics"
  contact: "risk-analytics@firm.example.com"

  update_schedule:
    frequency: "daily"
    time: "09:00 AM"
    timezone: "US/Eastern"

  data_quality_owner: "Data Governance"
  compliance_owner: "Audit & Compliance (SOX)"

# =============================================================================
# JOIN SEMANTICS (For AWS Semantic Layer consumer)
# =============================================================================

join_semantics:
  - join_name: "positions_with_stock_details"
    tables: ["positions", "stocks"]
    join_type: "inner"
    join_condition: "positions.ticker = stocks.ticker"
    when_to_join: "Always join when querying position-level data with stock attributes (sector, industry, market_cap, etc.)"
    pre_aggregation_rule: "Join BEFORE aggregating position values to get correct sector/industry groupings"
    fan_out_warning: "No fan-out risk - ticker is unique in stocks table"
    columns_available_after_join:
      - "stocks.company_name"
      - "stocks.sector"
      - "stocks.industry"
      - "stocks.exchange"
      - "stocks.market_cap_billions"
      - "stocks.pe_ratio"
      - "stocks.beta"
    sample_query: "SELECT stocks.sector, SUM(positions.market_value) FROM positions INNER JOIN stocks ON positions.ticker = stocks.ticker GROUP BY stocks.sector"

  - join_name: "positions_with_portfolio_details"
    tables: ["positions", "portfolios"]
    join_type: "inner"
    join_condition: "positions.portfolio_id = portfolios.portfolio_id"
    when_to_join: "Always join when querying position-level data with portfolio attributes (manager, strategy, risk_level, etc.)"
    pre_aggregation_rule: "Join BEFORE aggregating to get correct portfolio-level groupings"
    fan_out_warning: "No fan-out risk - portfolio_id is unique in portfolios table"
    columns_available_after_join:
      - "portfolios.portfolio_name"
      - "portfolios.manager_name"
      - "portfolios.strategy"
      - "portfolios.risk_level"
      - "portfolios.benchmark"
      - "portfolios.status"
    sample_query: "SELECT portfolios.manager_name, SUM(positions.market_value) FROM positions INNER JOIN portfolios ON positions.portfolio_id = portfolios.portfolio_id WHERE portfolios.status = 'Active' GROUP BY portfolios.manager_name"

  - join_name: "full_position_context"
    tables: ["positions", "portfolios", "stocks"]
    join_type: "inner"
    join_condition: "positions.portfolio_id = portfolios.portfolio_id AND positions.ticker = stocks.ticker"
    when_to_join: "Join all three tables when analysis requires both stock and portfolio dimensions simultaneously"
    pre_aggregation_rule: "Join BEFORE aggregating to enable multi-dimensional grouping"
    fan_out_warning: "No fan-out risk - both foreign keys reference unique dimension records"
    columns_available_after_join:
      - "All columns from stocks table"
      - "All columns from portfolios table"
    sample_query: "SELECT portfolios.strategy, stocks.sector, SUM(positions.market_value), AVG(positions.unrealized_gain_loss_pct) FROM positions INNER JOIN portfolios ON positions.portfolio_id = portfolios.portfolio_id INNER JOIN stocks ON positions.ticker = stocks.ticker WHERE portfolios.status = 'Active' AND positions.position_status = 'Open' GROUP BY portfolios.strategy, stocks.sector"
