# Source configuration for financial_portfolios workload
# Generated by Metadata Agent

source:
  name: financial_portfolios
  type: s3
  format: csv
  location: s3://data-onboarding-landing-133661573128-us-east-1/financial_portfolios/
  partition_pattern: "YYYY-MM-DD"

  # Authentication
  credentials:
    type: iam_role
    role_arn_secret: "arn:aws:secretsmanager:us-east-1:133661573128:secret:data-onboarding/s3-reader-role"

  # Update schedule
  frequency: daily
  expected_arrival_time: "09:00:00"
  timezone: "US/Eastern"

  # Tables
  tables:
    - name: stocks
      file_pattern: "stocks.csv"
      primary_key: ticker
      row_count_expected: 50
      description: "Reference data for publicly traded stocks"

    - name: portfolios
      file_pattern: "portfolios.csv"
      primary_key: portfolio_id
      row_count_expected: 15
      description: "Investment portfolios managed by the firm"

    - name: positions
      file_pattern: "positions.csv"
      primary_key: position_id
      row_count_expected: 138
      description: "Current holdings across all portfolios"
      foreign_keys:
        - column: portfolio_id
          references_table: portfolios
          references_column: portfolio_id
        - column: ticker
          references_table: stocks
          references_column: ticker

  # CSV options
  csv_options:
    delimiter: ","
    header: true
    encoding: "utf-8"
    quote_char: "\""
    escape_char: "\\"
    null_value: ""

  # Compliance
  compliance:
    - SOX  # Sarbanes-Oxley Act - financial audit trails required

  retention_years: 7

  # Data quality expectations
  quality_expectations:
    - no_duplicate_primary_keys
    - referential_integrity
    - no_null_in_required_fields
