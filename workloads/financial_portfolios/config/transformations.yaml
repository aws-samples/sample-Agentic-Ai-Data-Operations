# Transformations configuration for financial_portfolios workload
# Defines Bronze → Silver → Gold transformations
# Generated by Transformation Agent

workload: financial_portfolios
version: "1.0"
domain: finance
compliance:
  - SOX  # Financial audit trails, 7-year retention

# =============================================================================
# BRONZE → SILVER: Cleaning & Validation
# =============================================================================

bronze_to_silver:
  # ---------------------------------------------------------------------------
  # STOCKS - Reference Data
  # ---------------------------------------------------------------------------
  stocks:
    description: "Clean and validate stock reference data"
    source:
      path: "s3://${DATA_LAKE_BUCKET}/bronze/financial_portfolios/stocks/"
      format: csv

    deduplication:
      enabled: true
      key: ticker
      strategy: keep_last  # Keep most recent record based on implicit ordering
      sort_by: null  # No explicit sort column, rely on file order

    validations:
      - column: ticker
        rule: not_null
        action: reject
        reason: "Ticker is the primary key - cannot be null"

      - column: company_name
        rule: not_null
        action: reject
        reason: "Company name is required for reference data"

      - column: sector
        rule: not_null
        action: reject
        reason: "Sector classification required for analytics"

      - column: industry
        rule: not_null
        action: reject
        reason: "Industry classification required for analytics"

      - column: current_price
        rule: greater_than
        value: 0
        action: quarantine
        reason: "Stock price must be positive"

      - column: market_cap_billions
        rule: greater_than
        value: 0
        action: quarantine
        reason: "Market cap must be positive"

      - column: price_52w_high
        rule: greater_than_or_equal
        value: current_price
        action: quarantine
        reason: "52-week high cannot be less than current price"

      - column: price_52w_low
        rule: less_than_or_equal
        value: current_price
        action: quarantine
        reason: "52-week low cannot be greater than current price"

    type_conversions:
      - column: listing_date
        from: string
        to: date
        format: "%Y-%m-%d"

      - column: market_cap_billions
        from: string
        to: decimal
        precision: 12
        scale: 2

      - column: current_price
        from: string
        to: decimal
        precision: 10
        scale: 2

      - column: price_52w_high
        from: string
        to: decimal
        precision: 10
        scale: 2

      - column: price_52w_low
        from: string
        to: decimal
        precision: 10
        scale: 2

      - column: pe_ratio
        from: string
        to: decimal
        precision: 8
        scale: 2

      - column: dividend_yield
        from: string
        to: decimal
        precision: 6
        scale: 4

      - column: beta
        from: string
        to: decimal
        precision: 6
        scale: 3

      - column: avg_volume_millions
        from: string
        to: decimal
        precision: 10
        scale: 2

    quarantine:
      enabled: true
      path: "s3://${DATA_LAKE_BUCKET}/quarantine/financial_portfolios/stocks/"
      retention_days: 30

    output:
      format: iceberg
      path: "s3://${DATA_LAKE_BUCKET}/silver/financial_portfolios/stocks/"
      partition_by: []  # Reference data - no partitioning needed
      table_properties:
        table_type: iceberg
        write_mode: overwrite
        format_version: 2

  # ---------------------------------------------------------------------------
  # PORTFOLIOS - Master Data
  # ---------------------------------------------------------------------------
  portfolios:
    description: "Clean and validate portfolio master data"
    source:
      path: "s3://${DATA_LAKE_BUCKET}/bronze/financial_portfolios/portfolios/"
      format: csv

    deduplication:
      enabled: true
      key: portfolio_id
      strategy: keep_last
      sort_by: null

    validations:
      - column: portfolio_id
        rule: not_null
        action: reject
        reason: "Portfolio ID is the primary key"

      - column: portfolio_name
        rule: not_null
        action: reject
        reason: "Portfolio name is required"

      - column: manager_name
        rule: not_null
        action: reject
        reason: "Manager name is required for SOX compliance"

      - column: total_value
        rule: greater_than_or_equal
        value: 0
        action: quarantine
        reason: "Total value cannot be negative"

      - column: cash_balance
        rule: greater_than_or_equal
        value: 0
        action: quarantine
        reason: "Cash balance cannot be negative"

      - column: num_positions
        rule: greater_than_or_equal
        value: 0
        action: quarantine
        reason: "Number of positions cannot be negative"

      - column: status
        rule: in_list
        values: ["Active", "Closed", "Suspended"]
        action: quarantine
        reason: "Invalid portfolio status"

    type_conversions:
      - column: inception_date
        from: string
        to: date
        format: "%Y-%m-%d"

      - column: last_rebalance_date
        from: string
        to: date
        format: "%Y-%m-%d"

      - column: total_value
        from: string
        to: decimal
        precision: 15
        scale: 2

      - column: cash_balance
        from: string
        to: decimal
        precision: 15
        scale: 2

      - column: num_positions
        from: string
        to: integer

      - column: avg_position_size
        from: string
        to: decimal
        precision: 15
        scale: 2

      - column: largest_position_pct
        from: string
        to: decimal
        precision: 6
        scale: 2

    quarantine:
      enabled: true
      path: "s3://${DATA_LAKE_BUCKET}/quarantine/financial_portfolios/portfolios/"
      retention_days: 30

    output:
      format: iceberg
      path: "s3://${DATA_LAKE_BUCKET}/silver/financial_portfolios/portfolios/"
      partition_by: []
      table_properties:
        table_type: iceberg
        write_mode: overwrite
        format_version: 2

  # ---------------------------------------------------------------------------
  # POSITIONS - Transaction/Fact Data
  # ---------------------------------------------------------------------------
  positions:
    description: "Clean and validate portfolio positions with FK integrity checks"
    source:
      path: "s3://${DATA_LAKE_BUCKET}/bronze/financial_portfolios/positions/"
      format: csv

    deduplication:
      enabled: true
      key: position_id
      strategy: keep_last
      sort_by: last_updated  # Keep most recent update

    validations:
      # Primary Key
      - column: position_id
        rule: not_null
        action: reject
        reason: "Position ID is the primary key"

      # Foreign Keys - CRITICAL validations (quarantine, not reject)
      - column: portfolio_id
        rule: not_null
        action: quarantine
        reason: "Position must be associated with a portfolio"
        critical: true

      - column: ticker
        rule: not_null
        action: quarantine
        reason: "Cannot process positions without ticker symbol - CRITICAL"
        critical: true

      # FK Integrity - Requires cross-table validation
      - column: portfolio_id
        rule: foreign_key
        reference_table: portfolios
        reference_column: portfolio_id
        action: quarantine
        reason: "Invalid portfolio reference - portfolio does not exist"
        critical: true

      - column: ticker
        rule: foreign_key
        reference_table: stocks
        reference_column: ticker
        action: quarantine
        reason: "Invalid ticker reference - stock not found in reference data"
        critical: true

      # Measures - Business Logic Validations
      - column: shares
        rule: greater_than
        value: 0
        action: quarantine
        reason: "Negative or zero shares not allowed - CRITICAL"
        critical: true

      - column: cost_basis
        rule: greater_than
        value: 0
        action: quarantine
        reason: "Cost basis must be positive"

      - column: market_value
        rule: greater_than
        value: 0
        action: quarantine
        reason: "Market value must be positive"

      - column: purchase_price
        rule: greater_than
        value: 0
        action: quarantine
        reason: "Purchase price must be positive"

      - column: current_price
        rule: greater_than
        value: 0
        action: quarantine
        reason: "Current price must be positive"

      - column: weight_pct
        rule: between
        min_value: 0
        max_value: 100
        action: quarantine
        reason: "Weight percentage must be between 0 and 100"

      - column: position_status
        rule: in_list
        values: ["Open", "Closed", "Partial"]
        action: quarantine
        reason: "Invalid position status"

    type_conversions:
      - column: entry_date
        from: string
        to: date
        format: "%Y-%m-%d"

      - column: last_updated
        from: string
        to: timestamp
        format: "%Y-%m-%d %H:%M:%S"

      - column: shares
        from: string
        to: decimal
        precision: 15
        scale: 4

      - column: cost_basis
        from: string
        to: decimal
        precision: 15
        scale: 2

      - column: purchase_price
        from: string
        to: decimal
        precision: 10
        scale: 2

      - column: current_price
        from: string
        to: decimal
        precision: 10
        scale: 2

      - column: market_value
        from: string
        to: decimal
        precision: 15
        scale: 2

      - column: unrealized_gain_loss
        from: string
        to: decimal
        precision: 15
        scale: 2

      - column: unrealized_gain_loss_pct
        from: string
        to: decimal
        precision: 8
        scale: 4

      - column: weight_pct
        from: string
        to: decimal
        precision: 6
        scale: 2

      - column: holding_period_days
        from: string
        to: integer

    quarantine:
      enabled: true
      path: "s3://${DATA_LAKE_BUCKET}/quarantine/financial_portfolios/positions/"
      retention_days: 30
      log_quarantine_reasons: true

    output:
      format: iceberg
      path: "s3://${DATA_LAKE_BUCKET}/silver/financial_portfolios/positions/"
      partition_by:
        - sector  # Enable efficient sector-level queries
      table_properties:
        table_type: iceberg
        write_mode: overwrite
        format_version: 2

# =============================================================================
# SILVER → GOLD: Star Schema Transformation
# =============================================================================

silver_to_gold:
  # ---------------------------------------------------------------------------
  # DIM_STOCKS - Stock Dimension (SCD Type 1)
  # ---------------------------------------------------------------------------
  dim_stocks:
    description: "Stock dimension table for star schema - current state only"
    source:
      table: silver.financial_portfolios.stocks
      format: iceberg

    type: dimension
    scd_type: 1  # Overwrite with current state

    columns: all  # Include all columns from silver.stocks

    output:
      format: iceberg
      path: "s3://${DATA_LAKE_BUCKET}/gold/financial_portfolios/dim_stocks/"
      partition_by: []
      table_properties:
        table_type: iceberg
        write_mode: overwrite
        format_version: 2

  # ---------------------------------------------------------------------------
  # DIM_PORTFOLIOS - Portfolio Dimension (SCD Type 1)
  # ---------------------------------------------------------------------------
  dim_portfolios:
    description: "Portfolio dimension table for star schema - current state only"
    source:
      table: silver.financial_portfolios.portfolios
      format: iceberg

    type: dimension
    scd_type: 1

    columns: all

    output:
      format: iceberg
      path: "s3://${DATA_LAKE_BUCKET}/gold/financial_portfolios/dim_portfolios/"
      partition_by: []
      table_properties:
        table_type: iceberg
        write_mode: overwrite
        format_version: 2

  # ---------------------------------------------------------------------------
  # FACT_POSITIONS - Central Fact Table
  # ---------------------------------------------------------------------------
  fact_positions:
    description: "Fact table with position-level metrics and foreign keys to dimension tables"
    source:
      table: silver.financial_portfolios.positions
      format: iceberg

    type: fact
    grain: "One row per position (portfolio-ticker combination)"

    joins:
      - table: silver.financial_portfolios.stocks
        alias: s
        type: inner
        'on': "positions.ticker = s.ticker"
        purpose: "Enrich positions with current stock attributes"

      - table: silver.financial_portfolios.portfolios
        alias: p
        type: inner
        'on': "positions.portfolio_id = p.portfolio_id"
        purpose: "Validate FK integrity and enrich with portfolio attributes"

    columns:
      # Primary Key
      - position_id

      # Foreign Keys
      - portfolio_id
      - ticker

      # Measures (Position Metrics)
      - shares
      - cost_basis
      - purchase_price
      - current_price
      - market_value
      - unrealized_gain_loss
      - unrealized_gain_loss_pct
      - weight_pct

      # Temporal
      - entry_date
      - last_updated
      - holding_period_days

      # Denormalized Dimensions (for query performance)
      - sector  # From stocks
      - position_status

    filters:
      - condition: "positions.position_status = 'Open'"
        description: "Only include open positions in fact table"

      - condition: "p.status = 'Active'"
        description: "Only include positions from active portfolios"

    output:
      format: iceberg
      path: "s3://${DATA_LAKE_BUCKET}/gold/financial_portfolios/fact_positions/"
      partition_by:
        - sector  # Partition by sector for efficient sector-level queries
      table_properties:
        table_type: iceberg
        write_mode: overwrite
        format_version: 2

  # ---------------------------------------------------------------------------
  # PORTFOLIO_SUMMARY - Pre-aggregated Metrics
  # ---------------------------------------------------------------------------
  portfolio_summary:
    description: "Portfolio-level aggregated metrics for fast dashboard queries"
    source:
      table: gold.financial_portfolios.fact_positions
      format: iceberg

    type: aggregate

    aggregations:
      - column: market_value
        function: sum
        alias: total_market_value
        description: "Total market value across all positions"

      - column: cost_basis
        function: sum
        alias: total_cost_basis
        description: "Total cost basis across all positions"

      - column: unrealized_gain_loss
        function: sum
        alias: total_unrealized_gain_loss
        description: "Total unrealized gain/loss"

      - column: position_id
        function: count
        alias: num_positions
        description: "Count of positions in portfolio"

      - column: unrealized_gain_loss_pct
        function: avg
        alias: avg_return_pct
        description: "Average return percentage across positions"

      - column: holding_period_days
        function: avg
        alias: avg_holding_period_days
        description: "Average holding period across positions"

      - column: weight_pct
        function: max
        alias: largest_position_pct
        description: "Percentage of largest single position"

    group_by:
      - portfolio_id

    calculated_columns:
      - name: total_return_pct
        expression: "(total_unrealized_gain_loss / total_cost_basis) * 100"
        type: decimal(8,4)
        description: "Portfolio-level return percentage"

    output:
      format: iceberg
      path: "s3://${DATA_LAKE_BUCKET}/gold/financial_portfolios/portfolio_summary/"
      partition_by: []
      table_properties:
        table_type: iceberg
        write_mode: overwrite
        format_version: 2

# =============================================================================
# LINEAGE TRACKING
# =============================================================================

lineage:
  enabled: true
  output_path: "s3://${DATA_LAKE_BUCKET}/lineage/financial_portfolios/"
  format: json
  track_column_level: true
  track_transformations: true
  include_row_counts: true
  include_quality_metrics: true
  hash_algorithm: sha256

